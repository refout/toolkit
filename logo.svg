<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 工具集外框 -->
  <rect x="15" y="15" width="70" height="70" rx="6" ry="6" fill="url(#containerGradient)" stroke="#2d3748" stroke-width="1.5" stroke-linejoin="round" />
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
  </defs>

  <!-- 网格线（9个25x25均等格子，精准划分） -->
  <line x1="15" y1="40" x2="85" y2="40" stroke="#e2e8f0" stroke-width="0.8" stroke-linecap="round" />
  <line x1="15" y1="65" x2="85" y2="65" stroke="#e2e8f0" stroke-width="0.8" stroke-linecap="round" />
  <line x1="40" y1="15" x2="40" y2="85" stroke="#e2e8f0" stroke-width="0.8" stroke-linecap="round" />
  <line x1="65" y1="15" x2="65" y2="85" stroke="#e2e8f0" stroke-width="0.8" stroke-linecap="round" />

  <!-- 第一行（正视图+精准居中） -->
  <!-- 1. 扳手（正视图，第一格中心(27.5,27.5)） -->
  <path d="M22.5 27.5 l10 0 l0 2 l-3 0 l0 3 l-4 0 l0 -3 l-3 0 l0 -2 z" fill="#38b2ac" stroke="#2a9d8f" stroke-width="0.5" stroke-linejoin="round" />
  
  <!-- 2. 螺丝刀（正视图，第二格中心(52.5,27.5)） -->
  <rect x="50.5" y="22.5" width="4" height="10" rx="1" ry="1" fill="#9f7aea" stroke="#805ad5" stroke-width="0.5" /> <!-- 手柄 -->
  <line x1="52.5" y1="32.5" x2="52.5" y2="37.5" stroke="#9f7aea" stroke-width="2" stroke-linecap="round" /> <!-- 刀杆 -->
  
  <!-- 3. 锤子（正视图，第三格中心(75,27.5)） -->
  <rect x="70" y="25" width="10" height="3" rx="1" ry="1" fill="#ed8936" stroke="#dd6b20" stroke-width="0.5" /> <!-- 锤头 -->
  <line x1="75" y1="28" x2="75" y2="37.5" stroke="#ed8936" stroke-width="2" stroke-linecap="round" /> <!-- 锤柄 -->

  <!-- 第二行（正视图+精准居中） -->
  <!-- 4. 卷尺（正视图，第四格中心(27.5,52.5)） -->
  <circle cx="27.5" cy="52.5" r="6" fill="#4299e1" stroke="#3182ce" stroke-width="0.5" />
  <path d="M27.5 46.5 l0 3 l5 0 l0 -3" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" />
  
  <!-- 5. 十字螺丝刀（正视图，第五格中心(52.5,52.5)） -->
  <path d="M49.5 52.5 l6 0 M52.5 49.5 l0 6" stroke="#e53e3e" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- 6. 钳子（正视图，第六格中心(75,52.5)） -->
  <path d="M70 52.5 l8 0 l2 2 l-2 0 l-2 -2 l-4 0 l2 2 l-2 0 l-2 -2 z" fill="#48bb78" stroke="#38a169" stroke-width="0.5" stroke-linejoin="round" />

  <!-- 第三行（正视图+精准居中） -->
  <!-- 7. 水平仪（正视图，第七格中心(27.5,72.5)） -->
  <rect x="21.5" y="70" width="12" height="5" rx="1" ry="1" fill="#718096" stroke="#606f7b" stroke-width="0.5" />
  <circle cx="27.5" cy="72.5" r="1.5" fill="#ffffff" stroke="#606f7b" stroke-width="0.5" />
  
  <!-- 8. 美工刀（正视图，第八格中心(52.5,72.5)） -->
  <rect x="47.5" y="70" width="10" height="5" rx="1" ry="1" fill="#2d3748" stroke="#242d37" stroke-width="0.5" />
  <path d="M57.5 70 l0 5 l2 0 l-2 -5 z" fill="#2d3748" stroke="#242d37" stroke-width="0.5" />
  
  <!-- 9. 螺母（正视图，第九格中心(75,72.5)） -->
  <circle cx="75" cy="72.5" r="5" fill="none" stroke="#805ad5" stroke-width="1.5" stroke-linejoin="round" />
  <path d="M70 72.5 l10 0 M75 67.5 l0 10" stroke="#805ad5" stroke-width="1" stroke-linecap="round" />
</svg>